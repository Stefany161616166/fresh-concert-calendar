<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Бронирование билета</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f7f7f7;
}

.page{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.form-box{
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    width:420px;
}

h1{
    text-align:center;
    font-size:22px;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    font-weight:600;
    margin-bottom:6px;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    background:#333;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#000;
}

.back{
    display:block;
    margin-top:15px;
    text-align:center;
    color:#ce5015;
    text-decoration:none;
}

.back:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="page">

<div class="form-box">

<h1>Бронирование билета<br>{{ event.title }}</h1>

<form method="post">
{% csrf_token %}

<div class="form-group">
<label>Ваше имя</label>
{{ form.name }}
</div>

<div class="form-group">
<label>Email</label>
{{ form.email }}
</div>

<div class="form-group">
<label>Телефон</label>
{{ form.phone }}
</div>

<button type="submit">Выбрать место</button>

</form>

<a href="{% url 'event_list' %}" class="back">Назад к афише</a>

</div>

</div>

</body>
</html>
